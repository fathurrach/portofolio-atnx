<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Lost in Space</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="/images/logo/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Outfit:wght@300;400;500;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0a0c;
      color: #ffffff;
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grids & glows */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 4rem 4rem;
      pointer-events: none;
      z-index: 1;
    }

    .bg-radial {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.03), transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: pulseGlow 4s ease-in-out infinite;
    }

    /* Peeps Canvas Styling */
    .peeps-canvas {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60vh;
      pointer-events: none;
      z-index: 2;
      opacity: 0.2; /* Subtle and dreamy opacity */
      filter: grayscale(1) brightness(0.8) contrast(1.2); /* Ensure perfect monochrome integration */
    }

    /* Glass card container */
    .glass-card {
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 12, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      padding: 3.5rem 2.5rem;
      width: 90%;
      max-w: 520px;
      text-align: center;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .glass-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 60px -15px rgba(255, 255, 255, 0.02);
    }

    /* 404 Heading styling */
    .title-404 {
      font-family: 'Michroma', sans-serif;
      font-size: 6.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 1.5rem;
      background: linear-gradient(180deg, #ffffff 40%, #52525b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.06));
      animation: trackingReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .subtitle {
      font-family: 'Space Grotesk', monospace;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #a1a1aa;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #ffffff;
      margin: 0 auto 2rem;
      opacity: 0.3;
    }

    .message {
      font-size: 0.95rem;
      font-weight: 300;
      color: #d4d4d8;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    /* Return button styling */
    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      color: #0a0a0c;
      font-family: 'Space Grotesk', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-decoration: none;
      padding: 1rem 2.2rem;
      border-radius: 14px;
      border: 1px solid #ffffff;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .btn-home:hover {
      background-color: transparent;
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(255, 255, 255, 0.2);
    }

    /* Keyframe Animations */
    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    @keyframes trackingReveal {
      0% {
        letter-spacing: -18px;
        opacity: 0;
      }
      100% {
        letter-spacing: -2px;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <!-- Background elements -->
  <div class="bg-grid"></div>
  <div class="bg-radial"></div>
  <div class="bg-glow"></div>

  <!-- Peeps Canvas (Walking People behind card) -->
  <canvas id="peeps-canvas" class="peeps-canvas"></canvas>

  <!-- Content card -->
  <div class="glass-card">
    <div class="title-404">404</div>
    <div class="subtitle">Page Not Found</div>
    <div class="divider"></div>
    <p class="message">
      You look lost. This page does not exist.
    </p>
    <a href="/" class="btn-home">Return Home</a>
  </div>

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const canvas = document.getElementById("peeps-canvas");
      if (!canvas) return;

      const ctx = canvas.getContext("2d");
      if (!ctx) return;

      const config = {
        src: "/images/peeps/all-peeps.png",
        rows: 15,
        cols: 7,
      };

      // UTILS
      const randomRange = (min, max) => min + Math.random() * (max - min);
      const randomIndex = (array) => randomRange(0, array.length) | 0;
      const removeFromArray = (array, i) => array.splice(i, 1)[0];
      const removeItemFromArray = (array, item) => removeFromArray(array, array.indexOf(item));
      const removeRandomFromArray = (array) => removeFromArray(array, randomIndex(array));
      const getRandomFromArray = (array) => array[randomIndex(array) | 0];

      // TWEEN FACTORIES
      const resetPeep = ({ stage, peep }) => {
        const direction = Math.random() > 0.5 ? 1 : -1;
        // Make them walk slightly lower on 404 page
        const offsetY = 50 - 150 * gsap.parseEase("power2.in")(Math.random());
        const startY = stage.height - peep.height + offsetY;
        let startX;
        let endX;

        if (direction === 1) {
          startX = -peep.width;
          endX = stage.width;
          peep.scaleX = 1;
        } else {
          startX = stage.width + peep.width;
          endX = 0;
          peep.scaleX = -1;
        }

        peep.x = startX;
        peep.y = startY;
        peep.anchorY = startY;

        return {
          startX,
          startY,
          endX,
        };
      };

      const normalWalk = ({ peep, props }) => {
        const { startY, endX } = props;
        const xDuration = 10;
        const yDuration = 0.25;

        const tl = gsap.timeline();
        tl.timeScale(randomRange(0.6, 1.4));
        tl.to(
          peep,
          {
            duration: xDuration,
            x: endX,
            ease: "none",
          },
          0
        );
        tl.to(
          peep,
          {
            duration: yDuration,
            repeat: xDuration / yDuration,
            yoyo: true,
            y: startY - 10,
          },
          0
        );

        return tl;
      };

      const walks = [normalWalk];

      // FACTORY FUNCTION FOR PEEP
      const createPeep = ({ image, rect }) => {
        const peep = {
          image,
          rect,
          width: rect[2],
          height: rect[3],
          x: 0,
          y: 0,
          anchorY: 0,
          scaleX: 1,
          walk: null,
          render: (context) => {
            context.save();
            context.translate(peep.x, peep.y);
            context.scale(peep.scaleX, 1);
            context.drawImage(
              peep.image,
              peep.rect[0],
              peep.rect[1],
              peep.rect[2],
              peep.rect[3],
              0,
              0,
              peep.width,
              peep.height
            );
            context.restore();
          },
        };
        return peep;
      };

      const img = new Image();
      const stage = { width: 0, height: 0 };
      const allPeeps = [];
      const availablePeeps = [];
      const crowd = [];

      const createPeeps = () => {
        const { rows, cols } = config;
        const { naturalWidth: width, naturalHeight: height } = img;
        const total = rows * cols;
        const rectWidth = width / rows;
        const rectHeight = height / cols;

        for (let i = 0; i < total; i++) {
          allPeeps.push(
            createPeep({
              image: img,
              rect: [
                (i % rows) * rectWidth,
                ((i / rows) | 0) * rectHeight,
                rectWidth,
                rectHeight,
              ],
            })
          );
        }
      };

      const initCrowd = () => {
        while (availablePeeps.length) {
          addPeepToCrowd().walk.progress(Math.random());
        }
      };

      const addPeepToCrowd = () => {
        if (availablePeeps.length === 0) return;
        const peep = removeRandomFromArray(availablePeeps);
        const walk = getRandomFromArray(walks)({
          peep,
          props: resetPeep({ peep, stage }),
        }).eventCallback("onComplete", () => {
          removePeepFromCrowd(peep);
          addPeepToCrowd();
        });

        peep.walk = walk;
        crowd.push(peep);
        crowd.sort((a, b) => a.anchorY - b.anchorY);

        return peep;
      };

      const removePeepFromCrowd = (peep) => {
        removeItemFromArray(crowd, peep);
        availablePeeps.push(peep);
      };

      const render = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        const dpr = window.devicePixelRatio || 1;
        ctx.scale(dpr, dpr);

        crowd.forEach((peep) => {
          peep.render(ctx);
        });

        ctx.restore();
      };

      const resize = () => {
        stage.width = canvas.clientWidth;
        stage.height = canvas.clientHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = stage.width * dpr;
        canvas.height = stage.height * dpr;

        crowd.forEach((peep) => {
          if (peep.walk) peep.walk.kill();
        });

        crowd.length = 0;
        availablePeeps.length = 0;
        availablePeeps.push(...allPeeps);

        initCrowd();
      };

      const init = () => {
        createPeeps();
        resize();
        gsap.ticker.add(render);
      };

      img.onload = init;
      img.src = config.src;

      window.addEventListener("resize", resize);
    });
  </script>
</body>
</html>
